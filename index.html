<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kyodai Mahjong</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="effects.js"></script>
    <script src="layouts.js"></script>
    <script src="ui.js"></script>
    <script src="mah.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #2c3e50;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        canvas {
            background-color: #34495e;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .hidden-dialog {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="w-screen h-screen flex flex-col justify-start items-center relative">
        <div id="top-bar" class="w-full bg-gray-800 text-white p-2 md:p-4 flex justify-between items-center shadow-md cursor-pointer">
            <div class="flex items-center space-x-2 md:space-x-4">
                <span class="text-2xl md:text-3xl"><img width="32" height="32" src="icon.png" alt="Kyodai Mahjong icon"></span>
                <span id="pairs-remaining-display" class="font-bold text-xl md:text-2xl">Pairs: 0</span>
            </div>
            <span id="timer-display" class="font-mono text-2xl md:text-3xl font-bold">00:00</span>
        </div>

        <div class="flex-grow flex justify-center items-center w-full">
            <canvas id="game-canvas"></canvas>
        </div>

        <div id="message-box" class="absolute inset-0 bg-black bg-opacity-70 flex justify-center items-center hidden-dialog transition-opacity duration-500 ease-in-out rounded-lg">
            <div class="bg-white rounded-xl shadow-2xl p-8 text-center transform scale-90 transition-transform duration-500">
                <h2 class="text-4xl font-bold text-gray-800 mb-4" id="dialog-title"></h2>
                <div id="dialog-content" class="text-xl text-gray-600 font-medium mb-6"></div>
                <div id="dialog-buttons" class="flex flex-col space-y-4"></div>
            </div>
        </div>
    </div>
</body>
</html>
